# Partial RoPE experiment.
# Change from baseline: RoPE applied to 16/64 head dims only.
# NOT YET RUNNABLE — requires Composer RoPE rope_dims parameter.

architecture:
  DecoderTransformer:
    head_dim: 64
    learnable_scale: false

    embedding:
      TokenEmbedding:
        init_method: normal
        init_std: 0.005
        norm: RMSNorm

    block:
      SequentialBlock:
        # Capture post-embedding hidden state as x0 for residual mixing
        forward_x0:
          ForwardContext:
            key: x0

        # Encoder half: push skip states after each block
        encoder:
          RepeatingBlock:
            num_layers_key: num_encoder_layers
            SequentialBlock:
              resid_mix:
                AddContext:
                  context_key: x0
                  hidden_weight: vector
                  context_weight: vector
              block:
                Residual:
                  residual_attention:
                    SequentialBlock:
                      ln_1: RMSNorm
                      attn:
                        CausalGroupedQueryAttention:
                          features:
                            - QKNorm
                            - RoPE:
                                rope_theta: 10000
                                # NOT YET SUPPORTED — requires Composer rope_dims param
                                # rope_dims: 16
                            - AttentionScale:
                                q: 1.5
                      attn_scale: VectorScale
                  residual_feedforward:
                    SequentialBlock:
                      ln_2: RMSNorm
                      mlp:
                        FFN:
                          activation: ReLU^2
                      mlp_scale: VectorScale
              push_skip:
                ForwardContext:
                  key: skip_stack
                  push: true

        # Decoder half: pop skip states before each block
        decoder:
          RepeatingBlock:
            num_layers_key: num_decoder_layers
            SequentialBlock:
              pop_skip:
                AddContext:
                  context_key: skip_stack
                  pop: true
                  context_weight: vector
              resid_mix:
                AddContext:
                  context_key: x0
                  hidden_weight: vector
                  context_weight: vector
              block:
                Residual:
                  residual_attention:
                    SequentialBlock:
                      ln_1: RMSNorm
                      attn:
                        CausalGroupedQueryAttention:
                          features:
                            - QKNorm
                            - RoPE:
                                rope_theta: 10000
                                # NOT YET SUPPORTED — requires Composer rope_dims param
                                # rope_dims: 16
                            - AttentionScale:
                                q: 1.5
                      attn_scale: VectorScale
                  residual_feedforward:
                    SequentialBlock:
                      ln_2: RMSNorm
                      mlp:
                        FFN:
                          activation: ReLU^2
                      mlp_scale: VectorScale

        norm: RMSNorm

    heads:
      clm:
        CausalLMHead:
          features:
            - SoftCap:
                limit: 30.0
                activation: Tanh

    features:
      - TiedLayers:
          heads.clm.head.weight: embedding.tok_emb.weight

models:
  baseline:
    DecoderTransformer:
      context_length: 1024
      vocab_size: 1024
      num_layers: 9
      hidden_size: !expr "self.num_attention_heads * self.head_dim"
      num_attention_heads: 8
      num_key_value_heads: 4
      head_dim: 64
      mlp_mult: 2
      intermediate_size: !expr "self.mlp_mult * self.hidden_size"
      # Encoder-decoder layer split
      num_encoder_layers: !expr "self.num_layers // 2"
      num_decoder_layers: !expr "self.num_layers - self.num_encoder_layers"

predictors:
  default: TextGenerator

tokenizers:
  default:
    SentencePiece:
      model_path: /workspace/parameter-golf/data/tokenizers/fineweb_1024_bpe.model
