# MLP 3x expansion experiment.
# Change from baseline: mlp_mult 2 -> 3 (intermediate_size 1024 -> 1536).
# Funded by int6 quantization savings (~3.7 MB headroom under 16 MB).
#
# The baseline architecture is a GPT-style decoder with:
#   - RMSNorm throughout (no learnable scale)
#   - RoPE positional embeddings (theta=10000)
#   - QK normalisation per head (RMSNorm, no learnable scale)
#   - Grouped Query Attention (8 heads, 4 KV heads)
#   - ReLU^2 activation in the FFN (mlp_mult=2)
#   - Logit soft-capping at 30.0
#   - Tied embedding / output head weights, init N(0, 0.005)
#   - Zero-init output projections (attn.proj, mlp.proj)
#   - No bias in linear layers
#   - Encoder-decoder skip connections (ForwardContext push + AddContext pop)
#   - Learnable residual mixing (AddContext hidden_weight + context_weight)
#   - Per-dimension attn_scale and mlp_scale (VectorScale)
#   - Per-head Q gain scaling (AttentionScale feature, init 1.5)

architecture:
  DecoderTransformer:
    head_dim: 64
    learnable_scale: false

    embedding:
      TokenEmbedding:
        init_method: normal
        init_std: 0.005
        norm: RMSNorm

    block:
      SequentialBlock:
        # Capture post-embedding hidden state as x0 for residual mixing
        forward_x0:
          ForwardContext:
            key: x0

        # Encoder half: push skip states after each block
        encoder:
          RepeatingBlock:
            num_layers_key: num_encoder_layers
            SequentialBlock:
              resid_mix:
                AddContext:
                  context_key: x0
                  hidden_weight: vector
                  context_weight: vector
              block:
                Residual:
                  residual_attention:
                    SequentialBlock:
                      ln_1: RMSNorm
                      attn:
                        CausalGroupedQueryAttention:
                          features:
                            - QKNorm
                            - RoPE:
                                rope_theta: 10000
                            - AttentionScale:
                                q: 1.5
                      attn_scale: VectorScale
                  residual_feedforward:
                    SequentialBlock:
                      ln_2: RMSNorm
                      mlp:
                        FFN:
                          activation: ReLU^2
                      mlp_scale: VectorScale
              push_skip:
                ForwardContext:
                  key: skip_stack
                  push: true

        # Decoder half: pop skip states before each block
        decoder:
          RepeatingBlock:
            num_layers_key: num_decoder_layers
            SequentialBlock:
              pop_skip:
                AddContext:
                  context_key: skip_stack
                  pop: true
                  context_weight: vector
              resid_mix:
                AddContext:
                  context_key: x0
                  hidden_weight: vector
                  context_weight: vector
              block:
                Residual:
                  residual_attention:
                    SequentialBlock:
                      ln_1: RMSNorm
                      attn:
                        CausalGroupedQueryAttention:
                          features:
                            - QKNorm
                            - RoPE:
                                rope_theta: 10000
                            - AttentionScale:
                                q: 1.5
                      attn_scale: VectorScale
                  residual_feedforward:
                    SequentialBlock:
                      ln_2: RMSNorm
                      mlp:
                        FFN:
                          activation: ReLU^2
                      mlp_scale: VectorScale

        norm: RMSNorm

    heads:
      clm:
        CausalLMHead:
          features:
            - SoftCap:
                limit: 30.0
                activation: Tanh

    features:
      - TiedLayers:
          heads.clm.head.weight: embedding.tok_emb.weight

models:
  baseline:
    DecoderTransformer:
      context_length: 1024
      vocab_size: 1024
      num_layers: 9
      hidden_size: !expr "self.num_attention_heads * self.head_dim"
      num_attention_heads: 8
      num_key_value_heads: 4
      head_dim: 64
      mlp_mult: 3
      intermediate_size: !expr "self.mlp_mult * self.hidden_size"
      # Encoder-decoder layer split
      num_encoder_layers: !expr "self.num_layers // 2"
      num_decoder_layers: !expr "self.num_layers - self.num_encoder_layers"

predictors:
  default: TextGenerator

tokenizers:
  default:
    SentencePiece:
      model_path: /workspace/parameter-golf/data/tokenizers/fineweb_1024_bpe.model
