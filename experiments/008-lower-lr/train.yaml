# Lower LR experiment.
# Changes from baseline: Muon lr 0.04->0.02, scalar lr 0.04->0.02, embed lr 0.05->0.03.
# Based on 6-point sweep showing baseline LR was ~2x too high.

manifest: !include model.yaml

model_name: baseline

training:
  pre_training:
    gpus: !env WORLD_SIZE:1
    batch_size: 64
    sequence_length: !expr "model.context_length"
    total_batch_tokens: !expr "max(self.gpus, 8) * self.batch_size * self.sequence_length"

    max_wallclock_seconds: 600
    warmup_steps: 10

    model_trainer:
      DecoderTransformerTrainer:
        optimizer:
          LayerWise:
            default_optimizer:
              Muon:
                lr: 0.02
                momentum: 0.95
                nesterov: true
                ns_steps: 5
                weight_decay: 0.0
                features:
                  - HyperparameterSchedule:
                      parameter: momentum
                      initial: 0.85
                      final: 0.95
                      scheduler:
                        LinearWarmup:
                          warmup_steps: 500
            groups:
              - name: embedding
                patterns: ["embedding.*"]
                optimizer:
                  Adam:
                    lr: 0.03
                    betas: [0.9, 0.95]
                    eps: 1.0e-8
              - name: block_scalars
                max_ndim: 1
                optimizer:
                  Adam:
                    lr: 0.02
                    betas: [0.9, 0.95]
                    eps: 1.0e-8

        scheduler:
          WallclockWarmdown:
            warmdown_steps: 1200
            decay_type: linear

        compile:
          fullgraph: true
          dynamic: false
        features:
          - CompileDiagnostics
          - Autocast:
              dtype: bfloat16
          - CUDABackend:
              allow_tf32: true
              cudnn_allow_tf32: true
              flash_sdp: true
              mem_efficient_sdp: false
              math_sdp: false
              cudnn_sdp: false

    data:
      TokenizedDataset:
        path: /workspace/parameter-golf/data/datasets/fineweb10B_sp1024/fineweb_train_*.bin
        shuffle: true
        bin_header_bytes: 1024

    features:
      - SystemDiagnostics:
          diagnostics_file: artifacts/system.json
      - ConfigSnapshot:
          config_file: artifacts/experiment.yaml
      - GradientAccumulation
      - SpeedMonitor
      - MemoryProfiler
      - Checkpointer:
          checkpoint_path: artifacts/checkpoint
          max_checkpoints: 1
          model_only: true
      - MetricsLogger:
          metrics_file: artifacts/metrics.jsonl
      - ConsoleLogger:
          interval: 10
