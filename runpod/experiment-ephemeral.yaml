name: golf-experiment-ephemeral

resources:
  cloud: runpod
  disk_size: 100
  image_id: docker:runpod/pytorch:1.0.2-cu1281-torch280-ubuntu2404

envs:
  GITHUB_TOKEN: null
  HUGGING_FACE_HUB_TOKEN: null
  GIT_USER_EMAIL: null
  GIT_USER_NAME: null
  EXPERIMENT_ARGS: ""
  EXPERIMENT: "baseline"
  COMPOSER_BRANCH: "parameter-golf"
  GOLF_BRANCH: "main"

setup: |
  set -euo pipefail
  mkdir -p /workspace
  git config --global url."https://oauth2:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
  git config --global user.email "${GIT_USER_EMAIL}"
  git config --global user.name "${GIT_USER_NAME}"
  git config --global pull.rebase true

  # Clone repos (always fresh on ephemeral disk)
  git clone -b ${COMPOSER_BRANCH} https://github.com/daystrom-ai/composer.git /workspace/composer
  git clone --depth 1 -b ${GOLF_BRANCH} https://github.com/kingsleyfaulkner/golf-research.git /workspace/golf-research
  git clone https://github.com/openai/parameter-golf.git /workspace/parameter-golf
  export COMPOSER_BRANCH_REF=$(cd /workspace/composer && git rev-parse --short HEAD)
  export COMPOSER_GOLF_BRANCH_REF=$(cd /workspace/golf-research && git rev-parse --short HEAD)

  # Download training data
  pip install numpy sentencepiece huggingface-hub datasets tqdm
  cd /workspace/parameter-golf && python3 data/cached_challenge_fineweb.py --variant sp1024
  rm -rf /workspace/.cache

  # Install composer and golf-research dependencies
  pip uninstall -y torchvision torchaudio
  cd /workspace/composer && pip install -e .
  pip install zstandard
  # pip cache purge

run: |
  cd /workspace/golf-research
  git fetch origin && git checkout -f ${GOLF_BRANCH} && git reset --hard origin/${GOLF_BRANCH}
  cd /workspace/composer
  git fetch origin && git checkout -f ${COMPOSER_BRANCH} && git pull
  cd /workspace/golf-research
  ./scripts/run_experiment.sh ${EXPERIMENT} ${EXPERIMENT_ARGS}
